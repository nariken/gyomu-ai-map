<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT活用法 診断｜あなたの仕事に効く使い方＋プロンプト</title>
<meta name="description" content="3問でわかる。あなたの仕事に効くChatGPTの使い方トップ3と、そのままコピペで使えるプロンプトが出ます。">
<style>
  :root{ --bg:#f4f3ee; --card:#ffffff; --muted:#6b6a64; --text:#1c1c1a; --border:rgba(0,0,0,0.14); --soft:#f4f3ee; --info-bg:#E6F1FB; --info:#0C447C; --tealbg:#E1F5EE; --teal:#0F6E56; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#1a1a18; --card:#242420; --muted:#a3a29a; --text:#f1efe8; --border:rgba(255,255,255,0.16); --soft:#2c2c28; --info-bg:#0C447C; --info:#B5D4F4; --tealbg:#085041; --teal:#9FE1CB; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",sans-serif;line-height:1.7;padding:2rem 1rem;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto}
  .lead{text-align:center;margin:0 0 1.5rem}
  .lead h1{font-size:21px;font-weight:500;margin:0 0 4px}
  .lead p{font-size:13px;color:var(--muted);margin:0}
  .panel{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1.2rem 1.3rem}
  .q{font-size:14px;font-weight:500;margin-top:4px}
  .qrow{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 1.2rem}
  .chip{font-size:13px;padding:7px 13px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
  .chip.sel{background:var(--tealbg);color:var(--teal);border-color:var(--teal)}
  button.run{font-size:14px;font-family:inherit;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:11px 20px;cursor:pointer}
  button.act{font-size:13px;font-family:inherit;background:transparent;color:var(--text);border:0.5px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer}
  .pbox{background:var(--soft);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:6px}
  .pbox pre{margin:0;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre-wrap;color:var(--text)}
  .copy{font-size:12px;font-family:inherit;background:transparent;border:0.5px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--text);margin-top:8px}
  #card{width:100%;background:#fff;border:1px solid #e7e5dd;border-radius:16px;overflow:hidden;color:#1c1c1a}
  #card .band{background:#E1F5EE;color:#0F6E56;padding:18px 20px}
  #card .k{font-size:12px;opacity:.85}
  #card .ttl{font-size:22px;font-weight:700;line-height:1.25;margin-top:2px}
  #card .lv{font-size:13px;margin-top:4px}
  #card .body{padding:14px 20px;background:#fff}
  #card .u{font-size:15px;margin-bottom:7px}
  #card .u b{color:#0F6E56}
  #card .foot{display:flex;justify-content:space-between;font-size:11px;color:#9a998f;padding:10px 20px;border-top:1px solid #efede6}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:1.5rem}
  .credit a{color:var(--info);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="lead">
    <h1>あなたに効く ChatGPT活用法 診断</h1>
    <p>3問で、あなたの仕事に効くChatGPTの使い方TOP3と、<b>そのままコピペで使えるプロンプト</b>が出ます。</p>
  </div>
  <div class="panel" id="form">
    <div class="q">Q1. ChatGPT、今どれくらい使ってる？</div>
    <div class="qrow" id="q1">
      <button class="chip" data-v="0">使ってない</button>
      <button class="chip" data-v="1">たまに</button>
      <button class="chip" data-v="2">よく使う</button>
    </div>
    <div class="q">Q2. 一番めんどうな作業は？（複数可）</div>
    <div class="qrow" id="q2">
      <button class="chip" data-v="mail">メール・問い合わせ返信</button>
      <button class="chip" data-v="doc">資料・文章作成</button>
      <button class="chip" data-v="research">情報収集・リサーチ</button>
      <button class="chip" data-v="data">数字・集計</button>
      <button class="chip" data-v="idea">アイデア出し</button>
      <button class="chip" data-v="task">予定・タスク管理</button>
      <button class="chip" data-v="sns">SNS・発信</button>
    </div>
    <button class="run" id="run">活用法を診断する</button>
  </div>
  <div id="result" style="margin-top:1.25rem;"></div>
  <p class="credit">MIWS — 「AIが会社を運営したらどうなるか」公開実験 ・ <a href="https://x.com/nariken">@nariken</a></p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  const URL_="nariken.github.io/gyomu-ai-map";
  const LV=["これから（初級）","活用中（中級手前）","使い手（中級）"];
  const T={
    mail:{t:"メール・問い合わせ返信",use:"返信文を一瞬で作る",p:"以下の問い合わせに、丁寧で簡潔な返信文を作って。\n【相手の文面】（ここに貼る）\n条件：敬語・3〜4行・最後に次の一手を1つ提案"},
    doc:{t:"資料・文章作成",use:"たたき台を作る",p:"次のテーマで、構成案と本文のたたき台を作って。\n【テーマ】（ここに書く）\n【読み手】（誰向けか）\n【分量】A4・1枚ほど"},
    research:{t:"情報収集・リサーチ",use:"要点を一瞬で整理",p:"次のテーマを、初心者にもわかるよう5つの要点で整理して。最後に『次に調べるべきこと』を3つ。\n【テーマ】（ここに書く）"},
    data:{t:"数字・集計",use:"傾向と打ち手を出す",p:"次のデータを見て、傾向・気になる点・打ち手を3つずつ挙げて。\n【データ】（ここに貼る）"},
    idea:{t:"アイデア出し",use:"壁打ち相手にする",p:"次のテーマでアイデアを10個出して。奇抜→現実的の順に、各1行で。\n【テーマ】（ここに書く）"},
    task:{t:"予定・タスク管理",use:"優先順位をつける",p:"次のやることリストを、緊急度×重要度で並べ替えて、今日やるべき3つと理由を。\n【リスト】（ここに貼る）"},
    sns:{t:"SNS・発信",use:"投稿の下書きを作る",p:"次の出来事を、Xの投稿に。共感を呼ぶ問いで終える。140字以内で3案。\n【出来事】（ここに書く）"}
  };
  const POP=["mail","doc","research"];
  let q1=null,q2=[];
  document.querySelectorAll('#q1 .chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('#q1 .chip').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');q1=+b.dataset.v;});
  document.querySelectorAll('#q2 .chip').forEach(b=>b.onclick=()=>{b.classList.toggle('sel');q2=[...document.querySelectorAll('#q2 .chip.sel')].map(x=>x.dataset.v);});
  document.getElementById('run').onclick=()=>{
    const r=document.getElementById('result');
    if(q1===null){r.innerHTML='<p style="font-size:13px;color:#A32D2D;">Q1を選んでください。</p>';return;}
    let keys=q2.slice(0,3); let pi=0; while(keys.length<3){ if(!keys.includes(POP[pi]))keys.push(POP[pi]); pi++; }
    let c='<div id="card"><div class="band"><div class="k">あなたに効く ChatGPT活用法</div><div class="ttl">'+T[keys[0]].t+' を、AIに任せる</div><div class="lv">あなたのレベル： '+LV[q1]+'</div></div>';
    c+='<div class="body">';
    keys.forEach((k,i)=>c+='<div class="u"><b>'+(i+1)+'.</b> '+T[k].t+'：'+T[k].use+'</div>');
    c+='</div><div class="foot"><span>ChatGPT活用法 診断</span><span>'+URL_+' · @nariken</span></div></div>';
    c+='<div style="margin-top:1rem;font-size:13px;color:var(--muted);">▼ そのままコピペで使えるプロンプト</div>';
    keys.forEach((k,i)=>{c+='<div class="pbox"><div style="font-size:13px;font-weight:500;">'+(i+1)+'. '+T[k].use+'</div><pre id="p'+i+'">'+T[k].p.replace(/</g,"&lt;")+'</pre><button class="copy" data-i="'+i+'">コピー</button></div>';});
    const share='私に効くChatGPT活用法、診断したら『'+T[keys[0]].t+'』だった👇\nコピペで使えるプロンプトまで出た。あなたは？\n→ https://'+URL_+'\n#ChatGPT #AI活用';
    c+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;"><button class="run" id="share" style="padding:8px 16px;">結果をシェア</button><button class="act" id="save">画像を保存</button><button class="act" onclick="location.href=\'https://x.com/nariken\'">もっと活用法を見る</button></div>';
    r.innerHTML=c;
    document.querySelectorAll('.copy').forEach(b=>b.onclick=()=>{const tx=document.getElementById('p'+b.dataset.i).innerText;navigator.clipboard.writeText(tx).then(()=>{b.textContent='コピーした！';setTimeout(()=>b.textContent='コピー',1400);});});
    const cardEl=document.getElementById('card');
    const toBlob=()=>html2canvas(cardEl,{scale:2,backgroundColor:'#ffffff'}).then(cv=>new Promise(res=>cv.toBlob(res,'image/png')));
    document.getElementById('save').onclick=()=>toBlob().then(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chatgpt-katsuyo.png';a.click();});
    document.getElementById('share').onclick=async()=>{const blob=await toBlob();const file=new File([blob],'chatgpt-katsuyo.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],text:share});return;}catch(e){if(e&&e.name==='AbortError')return;}}const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chatgpt-katsuyo.png';a.click();window.open('https://x.com/intent/post?text='+encodeURIComponent(share),'_blank');};
    r.scrollIntoView({behavior:'smooth',block:'nearest'});
  };
</script>
<script data-goatcounter="https://nariken.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
